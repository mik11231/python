name: CI Lite

on:
  push:
    branches:
      - main
      - master
    paths:
      - "aoclib/**"
      - "tools/**"
      - "advent20*/Day*/day*.py"
      - "advent20*/README.md"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/ci-lite.yml"
  pull_request:
    paths:
      - "aoclib/**"
      - "tools/**"
      - "advent20*/Day*/day*.py"
      - "advent20*/README.md"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/ci-lite.yml"
  workflow_dispatch:
    inputs:
      full_verify:
        description: "Run full cross-year answer verification"
        required: false
        default: "false"

jobs:
  quick-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Compile sanity
        run: |
          python -m py_compile aoclib/*.py tools/*.py

      - name: Static audit
        run: |
          python tools/audit_aoc.py

      - name: Style lint
        run: |
          python tools/lint_aoc_style.py

      - name: Verify (scoped to changed years)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ -n "${BASE_SHA}" ] && [ "${BASE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          else
            CHANGED_FILES="$(git show --name-only --pretty='' "${HEAD_SHA}")"
          fi

          YEARS="$(printf '%s\n' "${CHANGED_FILES}" | sed -n 's#^advent\([0-9][0-9][0-9][0-9]\)/.*#\1#p' | sort -u)"
          if [ -z "${YEARS}" ]; then
            echo "No Advent year changes detected; skipping scoped verification."
            exit 0
          fi

          echo "Changed Advent years: ${YEARS}"
          for YEAR in ${YEARS}; do
            echo "Verifying year ${YEAR}"
            python -m aoclib verify --year "${YEAR}" --timeout 240
          done

  full-verify:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.full_verify == 'true'
    runs-on: ubuntu-latest
    needs: quick-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verify (full)
        run: |
          python -m aoclib verify --timeout 240
